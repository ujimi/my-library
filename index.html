<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library</title>

<style>
body{
    margin:0;
    background:#efe6d8;
    font-family: "Yu Mincho","Hiragino Mincho ProN",serif;
    color:#4b3621;
}

.book{
    max-width:900px;
    margin:50px auto;
    background:#f9f4eb;
    border:1px solid #ccb89d;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    display:flex;
}

.menu{
    width:230px;
    border-right:1px solid #d8c4a9;
    padding:30px;
}

.page{
    flex:1;
    padding:40px;
}

h1{
    margin-top:0;
}

.category{
    margin:15px 0;
    cursor:pointer;
}

.search{
    width:100%;
    padding:8px;
    margin-top:30px;
}

.post{
    margin:25px 0;
    border-bottom:1px solid #ddd;
    padding-bottom:15px;
}

.tag{
    display:inline-block;
    background:#e9dfcf;
    padding:3px 10px;
    border-radius:20px;
    margin-right:5px;
    font-size:13px;
}
</style>

</head>

<body>

<div class="book">

<div class="menu">

<h1>📚 My Library</h1>

<div class="category">📖 騎士</div>
<div class="category">🎼 作曲家</div>
<div class="category">💭 考察</div>
<div class="category">❤️ お気に入り</div>

<input class="search" placeholder="検索">

</div>

<div class="page">

<h2>最新の投稿</h2>

<div class="post">
<h3>サンプル投稿</h3>
<p>ここに説明を書きます。</p>

<span class="tag">騎士</span>
<span class="tag">考察</span>

</div>

</div>

</div>

</body>
</html>
