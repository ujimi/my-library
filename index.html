<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <div class="book">

        <aside class="sidebar">

            <h1 class="logo">
                The Archive
            </h1>

            <p class="subtitle">
                personal records & notes
            </p>

            <div class="section">

                <input
                    id="search"
                    class="search"
                    type="text"
                    placeholder="Search..."
                >

            </div>

            <div class="section">

                <h3>Archive</h3>

               <nav class="menu">

    <button class="menu-item" data-category="k">
        ⚔️🎹
    </button>

    <button class="menu-item" data-category="o">
        🍵
    </button>

    <button class="menu-item" data-category="a">
        ☔
    </button>

    <button class="menu-item" data-category="p">
        🐼
    </button>

    <button class="menu-item" data-category="u">
        🐰
    </button>

    <button class="menu-item" data-category="d">
        🍡
    </button>

    <button class="menu-item" data-category="x">
        その他
    </button>

    <div class="menu-section">
        SECRET
    </div>

    <button class="menu-item secret-toggle" id="secret-toggle">
        🗝
    </button>

    <div class="secret-menu" id="secret-menu">

        <button class="menu-item secret-item"
                data-category="yc">
            考察
        </button>

        <button class="menu-item secret-item"
                data-category="yi">
            解釈
        </button>

    </div>

</nav>

        </aside>

        <main class="content">

            <div class="content-header">

                <h2 id="section-title">
                    The Archive
                </h2>

                <span id="post-count">
                    0 posts
                </span>

            </div>

            <div id="posts">

                <!-- script.js が投稿を表示 -->

            </div>

        </main>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
