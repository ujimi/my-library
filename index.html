<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Archive</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <div class="book">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h1 class="logo">
                The Archive
            </h1>

            <p class="subtitle">
                personal records & notes
            </p>

            <div class="section">

                <input
                    id="search"
                    class="search"
                    type="text"
                    placeholder="Search..."
                >

            </div>

            <div class="section">

                <h3>Archive</h3>

                <nav class="menu">

                    <button class="menu-item active" data-section="all">
                        All
                    </button>

                    <button class="menu-item" data-section="tweets">
                        ⚔️🎹
                    </button>

                    <button class="menu-item" data-section="tea">
                        🍵
                    </button>

                    <button class="menu-item" data-section="rain">
                        ☔
                    </button>

                    <button class="menu-item" data-section="panda">
                        🐼
                    </button>

                    <button class="menu-item" data-section="rabbit">
                        🐰
                    </button>

                    <button class="menu-item" data-section="dango">
                        🍡
                    </button>

                    <button class="menu-item" data-section="other">
                        その他
                    </button>

                </nav>

            </div>

        </aside>

        <!-- Main -->

        <main class="content">

            <div class="content-header">

                <h2 id="section-title">
                    The Archive
                </h2>

                <span id="post-count">
                    0 posts
                </span>

            </div>

            <div id="posts">

                <!-- script.js が自動で投稿を表示 -->

            </div>

        </main>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
