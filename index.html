<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Archive</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <div class="book">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h1 class="logo">The Archive</h1>

            <p class="subtitle">
                personal records & notes
            </p>

            <div class="section">

                <input
                    id="search"
                    class="search"
                    type="text"
                    placeholder="Search..."
                >

            </div>

            <div class="section">

                <h3>Archive</h3>

                <nav class="menu">

                    <a href="#" data-section="all">すべて</a>

                    <a href="#" data-section="tweets">⚔️🎹 呟き</a>

                    <a href="#" data-section="tea">🍵</a>

                    <a href="#" data-section="rain">☔</a>

                    <a href="#" data-section="panda">🐼</a>

                    <a href="#" data-section="rabbit">🐰</a>

                    <a href="#" data-section="dango">🍡</a>

                    <a href="#" data-section="other">その他</a>

                </nav>

            </div>

        </aside>

        <!-- Main -->

        <main class="content">

            <div id="posts">

                <!-- script.js がここへ自動で投稿を表示 -->

            </div>

        </main>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
